name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Unit tests + type check + build (runs on every push & PR) ────────────
  unit:
    name: TypeScript + Unit Tests + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
          submodules: recursive

      - name: Verify source revision
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Verify pinned product contract
        run: npm run contract:check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        # Shared DOM globals and fake timers make the full UI suite flaky when
        # files run concurrently; keep CI deterministic.
        run: npm run test:unit -- --maxWorkers=1

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL || 'http://localhost:8080' }}

  # ── Deploy to Vercel (main branch only, after unit tests pass) ────────────
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: unit
    # A manual dispatch is reserved for the isolated E2E job below; it must not
    # promote production as a side effect.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    environment: production
    concurrency:
      group: dashboard-ts-production
      cancel-in-progress: false
    env:
      VERCEL_CLI_VERSION: 55.0.0
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PRODUCTION_SMOKE_URL: ${{ vars.PRODUCTION_SMOKE_URL || 'https://dashboard.eventiapp.com.mx' }}

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Verify deployment revision
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: test "$(git rev-parse HEAD)" = "${EXPECTED_SHA}"

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify pinned Vercel CLI
        run: test "$(npx --yes vercel@${VERCEL_CLI_VERSION} --version)" = "${VERCEL_CLI_VERSION}"

      - name: Pull Vercel project config
        run: npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Reconcile production domains
        env:
          VERCEL_PRODUCTION_DOMAINS: dashboard.eventiapp.com.mx,dashboard.itbem.com,dashboard.itbem.com.mx,dashboard.cafettonhouse.com
        run: node scripts/reconcile-vercel-domains.mjs

      - name: Synchronize tenant Cognito clients
        env:
          COGNITO_EVENTIAPP_CLIENT_ID: ${{ secrets.COGNITO_EVENTIAPP_CLIENT_ID }}
          COGNITO_ITBEM_CLIENT_ID: ${{ secrets.COGNITO_ITBEM_CLIENT_ID }}
          COGNITO_CAFETTONHOUSE_CLIENT_ID: ${{ secrets.COGNITO_CAFETTONHOUSE_CLIENT_ID }}
        run: |
          set -euo pipefail
          node scripts/validate-cognito-tenant-clients.mjs
          printf '%s' "${COGNITO_EVENTIAPP_CLIENT_ID}" | npx --yes vercel@${VERCEL_CLI_VERSION} env add COGNITO_EVENTIAPP_CLIENT_ID production --force --token="${VERCEL_TOKEN}"
          printf '%s' "${COGNITO_ITBEM_CLIENT_ID}" | npx --yes vercel@${VERCEL_CLI_VERSION} env add COGNITO_ITBEM_CLIENT_ID production --force --token="${VERCEL_TOKEN}"
          printf '%s' "${COGNITO_CAFETTONHOUSE_CLIENT_ID}" | npx --yes vercel@${VERCEL_CLI_VERSION} env add COGNITO_CAFETTONHOUSE_CLIENT_ID production --force --token="${VERCEL_TOKEN}"
          printf '%s' 'us-east-1' | npx --yes vercel@${VERCEL_CLI_VERSION} env add COGNITO_AWS_REGION production --force --token="${VERCEL_TOKEN}"
          npx --yes vercel@${VERCEL_CLI_VERSION} pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build for Vercel
        run: npx --yes vercel@${VERCEL_CLI_VERSION} build --prod --token="${VERCEL_TOKEN}"
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ vars.NEXT_PUBLIC_BACKEND_URL || 'https://api.eventiapp.com.mx' }}

      - name: Capture current production deployment
        id: previous
        run: |
          PREVIOUS_JSON="$(npx --yes vercel@${VERCEL_CLI_VERSION} inspect \
            "${PRODUCTION_SMOKE_URL}" --format=json --token="${VERCEL_TOKEN}")"
          PREVIOUS_ID="$(jq -er '.id | select(startswith("dpl_"))' <<< "${PREVIOUS_JSON}")"
          echo "deployment_id=${PREVIOUS_ID}" >> "${GITHUB_OUTPUT}"

      - name: Deploy immutable candidate without production aliases
        id: candidate
        run: |
          DEPLOYMENT_JSON="$(npx --yes vercel@${VERCEL_CLI_VERSION} deploy \
            --prebuilt --prod --skip-domain --yes --format=json \
            --meta "githubCommitSha=${GITHUB_SHA}" \
            --token="${VERCEL_TOKEN}")"
          DEPLOYMENT_ID="$(jq -er '.id | select(startswith("dpl_"))' <<< "${DEPLOYMENT_JSON}")"
          DEPLOYMENT_URL="$(jq -er '.url | select(startswith("https://"))' <<< "${DEPLOYMENT_JSON}")"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "${GITHUB_OUTPUT}"
          echo "deployment_url=${DEPLOYMENT_URL}" >> "${GITHUB_OUTPUT}"

      - name: Smoke immutable candidate
        env:
          DEPLOYMENT_URL: ${{ steps.candidate.outputs.deployment_url }}
        run: |
          # Preview deployments use Vercel Authentication. `vercel curl`
          # obtains a short-lived protection bypass using the existing CLI
          # token, so this probes our application instead of following the SSO
          # redirect and accidentally accepting Vercel's login page as healthy.
          SMOKE_HEADERS="$(mktemp)"
          trap 'rm -f "${SMOKE_HEADERS}"' EXIT

          npx --yes vercel@${VERCEL_CLI_VERSION} curl \
            "/api/og?title=Release%20Smoke&language=es-MX" \
            --deployment "${DEPLOYMENT_URL}" \
            --yes \
            -- \
            --fail --silent --show-error \
            --retry 6 --retry-all-errors --retry-delay 5 --max-time 20 \
            --dump-header "${SMOKE_HEADERS}" --output /dev/null

          grep --quiet --extended-regexp '^HTTP/[0-9.]+ 200([[:space:]]|$)' "${SMOKE_HEADERS}"
          grep --quiet --ignore-case --extended-regexp \
            '^content-type:[[:space:]]*image/png([[:space:]]|;)' \
            "${SMOKE_HEADERS}"

      - name: Promote, smoke production alias, and roll back on failure
        env:
          DEPLOYMENT_ID: ${{ steps.candidate.outputs.deployment_id }}
          PREVIOUS_DEPLOYMENT_ID: ${{ steps.previous.outputs.deployment_id }}
        run: |
          smoke_production() {
            local smoke_headers
            local auth_status
            local auth_curl_status
            local og_curl_status
            smoke_headers="$(mktemp)"

            curl --fail --silent --show-error \
              --retry 6 --retry-all-errors --retry-delay 5 --max-time 20 \
              --dump-header "${smoke_headers}" --output /dev/null \
              "${PRODUCTION_SMOKE_URL%/}/api/og?title=Release%20Smoke&language=es-MX"
            og_curl_status=$?

            if [[ ${og_curl_status} -ne 0 ]] || \
              ! grep --quiet --extended-regexp '^HTTP/[0-9.]+ 200([[:space:]]|$)' "${smoke_headers}" || \
              ! grep --quiet --ignore-case --extended-regexp \
                '^content-type:[[:space:]]*image/png([[:space:]]|;)' \
                "${smoke_headers}"; then
              rm -f "${smoke_headers}"
              return 1
            fi
            rm -f "${smoke_headers}"

            # A missing browser session must remain a deliberate, non-cacheable
            # 401. This catches accidental auth-route rewrites after promotion.
            auth_status="$(curl --silent --show-error \
              --retry 6 --retry-all-errors --retry-delay 5 --max-time 20 \
              --output /dev/null --write-out '%{http_code}' \
              "${PRODUCTION_SMOKE_URL%/}/api/auth/token")"
            auth_curl_status=$?

            [[ ${auth_curl_status} -eq 0 && "${auth_status}" == "401" ]] || return 1

            # All custom domains share one deployment but are separate product
            # boundaries. Validate branding, private caching, CSP API access,
            # clickjacking protection, and the unauthenticated token boundary
            # before accepting the promotion.
            node scripts/smoke-production-tenants.mjs
          }

          set +e
          npx --yes vercel@${VERCEL_CLI_VERSION} promote "${DEPLOYMENT_ID}" \
            --yes --timeout=3m --token="${VERCEL_TOKEN}"
          PROMOTE_STATUS=$?

          SMOKE_STATUS=1
          if [[ ${PROMOTE_STATUS} -eq 0 ]]; then
            smoke_production
            SMOKE_STATUS=$?
          fi
          set -e

          if [[ ${PROMOTE_STATUS} -ne 0 || ${SMOKE_STATUS} -ne 0 ]]; then
            if [[ "${PREVIOUS_DEPLOYMENT_ID}" == dpl_* ]]; then
              npx --yes vercel@${VERCEL_CLI_VERSION} rollback \
                "${PREVIOUS_DEPLOYMENT_ID}" --yes --timeout=3m \
                --token="${VERCEL_TOKEN}"
            else
              echo "Promotion failed and the previous production deployment is invalid." >&2
            fi
            exit 1
          fi

# ── Deterministic persona E2E — every production promotion ──────────────────
  persona-e2e:
    name: Persona E2E (production)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify all role workspaces against the promoted UI
        run: npx playwright test --project=personas
        env:
          PLAYWRIGHT_BASE_URL: ${{ vars.PRODUCTION_SMOKE_URL || 'https://dashboard.eventiapp.com.mx' }}
          CI: true

      - name: Upload persona report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: persona-playwright-report
          path: playwright-report/
          retention-days: 7

# ── Full authenticated E2E — manual staging trigger ──────────────────────────
# E2E requires a real Cognito staging pool (stagingauth.eventiapp.com.mx),
# TEST_EMAIL / TEST_PASSWORD secrets, and the full auth flow.
# Run manually when you have the staging environment ready.
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.23.1
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
          COGNITO_USER_POOL_ID: ${{ secrets.COGNITO_USER_POOL_ID }}
          COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
          COGNITO_DOMAIN: ${{ secrets.COGNITO_DOMAIN }}
          COGNITO_REDIRECT_URI: ${{ secrets.COGNITO_REDIRECT_URI }}
          COGNITO_LOGOUT_REDIRECT_URI: ${{ secrets.COGNITO_LOGOUT_REDIRECT_URI }}

      - name: Start app
        run: npm run start &
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          PORT: 3000

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ secrets.NEXT_PUBLIC_BACKEND_URL }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
